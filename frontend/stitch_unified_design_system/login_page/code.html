<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

<title>Login | Mountain View ERP</title>

                    "tertiary-fixed-dim": "#ffb4ac",
                    "inverse-on-surface": "#e6f3fb",
                    "error": "#ba1a1a",
                    "background": "#f4faff",
                    "on-error": "#ffffff",
                    "primary-container": "#0077ce",
                    "on-primary-container": "#fdfcff",
                    "inverse-primary": "#a2c9ff",
                    "surface-variant": "#d7e4ec",
                    "on-error-container": "#93000a",
                    "surface-container-highest": "#d7e4ec",
                    "secondary": "#3e6a00",
                    "error-container": "#ffdad6",
                    "secondary-fixed": "#b9f474",
                    "surface-container-lowest": "#ffffff",
                    "outline": "#707783",
                    "primary-fixed-dim": "#a2c9ff",
                    "tertiary": "#b7131a",
                    "on-tertiary-fixed-variant": "#93000d",
                    "surface-container-high": "#ddeaf2",
                    "tertiary-fixed": "#ffdad6",
                    "on-tertiary-fixed": "#410002",
                    "surface-tint": "#0060a8",
                    "on-tertiary-container": "#fffbff",
                    "primary": "#005ea4",
                    "on-tertiary": "#ffffff",
                    "on-secondary": "#ffffff",
                    "surface": "#f4faff",
                    "on-primary": "#ffffff",
                    "inverse-surface": "#263238",
                    "secondary-container": "#b9f474",
                    "surface-container": "#e3f0f8",
                    "on-secondary-fixed": "#0f2000",
                    "surface-bright": "#f4faff",
                    "on-surface": "#111d23",
                    "on-secondary-container": "#437000",
                    "surface-container-low": "#e9f6fd",
                    "on-surface-variant": "#404752",
                    "on-secondary-fixed-variant": "#2e4f00",
                    "on-primary-fixed-variant": "#004881",
                    "on-primary-fixed": "#001c38",
                    "outline-variant": "#c0c7d4"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",

            "spacing": {

                    "xs": "4px",
                    "margin-desktop": "48px",

                    "md": "16px",
                    "base": "4px",

                    "sm": "8px",
                    "gutter": "24px",
                    "3xl": "64px"
            },
            "fontFamily": {
                    "headline-lg": ["Plus Jakarta Sans"],
                    "display": ["Plus Jakarta Sans"],
                    "headline-sm": ["Plus Jakarta Sans"],

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .login-card-shadow {
            box-shadow: 0px 12px 24px rgba(0,0,0,0.05);
        }
        body {
            background-color: #f4faff;
            background-image: radial-gradient(circle at 20% 20%, rgba(0, 94, 164, 0.03) 0%, transparent 40%),
                              radial-gradient(circle at 80% 80%, rgba(62, 106, 0, 0.03) 0%, transparent 40%);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col font-body-md text-on-surface">
<main class="flex-grow flex items-center justify-center px-margin-mobile md:px-margin-desktop py-xl">
<div class="w-full max-w-[440px]">
<!-- Login Card -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-lg md:p-xl login-card-shadow overflow-hidden relative">
<!-- Brand Identity Section -->
<div class="flex flex-col items-center mb-xl">
<div class="mb-lg">
<img alt="Mountain View City Public Schools" class="h-16 w-auto object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBc-X8YsoprWSYHm-nFl26kNbcGD02D0w7bDFQJZflPntPOSsgaKFdwXevQh3kM4WAm6Gk6473lT_RjPCdkRpT6yXU_nf177I4sGYVqtb2nyqOQ1O85wDvqe4OT9iM3rGNNTmo_21sxuy9HzO6cw8ILyuW3aX6YCA2UswwNeCtC4-8D3Iy-QK5KqrT8Xmt99IdwLUx8NbJ_R9mQrLEsPTia35bRR-44WLGgU7-SY4v0ZzMVjmNtL9YDlmhBi_YBLSkku5xJc62HEp8"/>
</div>
<div class="text-center">
<h1 class="font-headline-md text-headline-md text-primary mb-xs">Welcome Back</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Sign in to Mountain View ERP</p>
</div>
</div>
<!-- Form Section -->
<form class="space-y-lg" id="loginForm">
<!-- Email Input -->
<div class="space-y-base">
<label class="font-label-lg text-label-lg text-on-surface block" for="email">Work Email</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full pl-[48px] pr-md py-md bg-surface-bright border border-outline-variant rounded-lg font-body-md text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" id="email" name="email" placeholder="name@mvschools.org" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-base">
<div class="flex justify-between items-center">
<label class="font-label-lg text-label-lg text-on-surface block" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:underline transition-all" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full pl-[48px] pr-[48px] py-md bg-surface-bright border border-outline-variant rounded-lg font-body-md text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors flex items-center justify-center" id="togglePassword" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Options Section -->
<div class="flex items-center">
<label class="flex items-center gap-sm cursor-pointer group">
<div class="relative flex items-center">
<input class="peer h-5 w-5 rounded border-outline-variant text-primary focus:ring-primary focus:ring-offset-0 transition-all cursor-pointer" type="checkbox"/>
</div>
<span class="font-body-md text-body-md text-on-surface-variant group-hover:text-on-surface transition-colors">Stay signed in for 30 days</span>
</label>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary text-on-primary font-label-lg text-label-lg py-md rounded-lg hover:bg-[#004881] active:scale-[0.98] transition-all flex items-center justify-center gap-sm shadow-sm" type="submit">
                        Sign In
                        <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<!-- Support Footer -->
<div class="mt-xl pt-lg border-t border-outline-variant text-center">
<p class="font-label-sm text-label-sm text-on-surface-variant">
                        Having trouble? <a class="text-primary hover:underline font-bold" href="#">Contact Support Portal</a>
</p>
</div>
</div>
<!-- Footer Links -->
<div class="mt-lg flex justify-center gap-lg">
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Accessibility</a>
</div>
</div>
</main>
<!-- Language Toggle (Micro-interaction) -->
<div class="fixed bottom-lg right-lg">
<button class="bg-surface-container-high text-on-surface-variant font-label-sm text-label-sm px-md py-sm rounded-full border border-outline-variant flex items-center gap-xs hover:bg-surface-container-highest transition-colors shadow-sm">
<span class="material-symbols-outlined text-[18px]">language</span>
            English (US)
            <span class="material-symbols-outlined text-[18px]">expand_more</span>
</button>
</div>
<script>
        // Micro-interaction: Password Toggle
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            togglePassword.querySelector('span').textContent = type === 'password' ? 'visibility' : 'visibility_off';
        });

        // Form Submission Effect
        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = `<span class="animate-spin material-symbols-outlined text-[20px]">progress_activity</span> Authenticating...`;
            
            // Simulate API Call
            setTimeout(() => {
                btn.innerHTML = `<span class="material-symbols-outlined text-[20px]">check_circle</span> Success`;
                btn.classList.replace('bg-primary', 'bg-secondary');
                setTimeout(() => {
                    window.location.reload(); // Simulate redirect
                }, 1000);
            }, 1500);
        });

        // Simple floating background movement for "atmosphere"
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            document.body.style.backgroundPosition = `${x * 10}% ${y * 10}%`;
        });
    </script>
</body></html>
